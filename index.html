<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賃貸需要ヒートマップ検索</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    max-width: 560px;
    margin: 60px auto;
    padding: 0 20px;
    color: #222;
  }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p.desc { color: #555; font-size: 14px; line-height: 1.6; }
  .box {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }
  input[type=text] {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  button {
    padding: 12px 20px;
    font-size: 16px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #e65c00; }
  #result {
    margin-top: 20px;
    padding: 14px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
  }
  #result.ok { background: #e8f5e9; color: #256029; display: block; }
  #result.ng { background: #fdecea; color: #b3261e; display: block; }
  #result a { color: inherit; font-weight: bold; }
  .linklist { list-style: none; padding: 0; margin: 10px 0 0; }
  .linklist li { margin-top: 6px; }
  .linklist a {
    display: block;
    padding: 10px 12px;
    background: white;
    border: 1px solid #cde5cf;
    border-radius: 6px;
    text-decoration: none;
    color: #256029;
    font-weight: bold;
  }
  .linklist a:hover { background: #f1f8f2; }
  .note { margin-top: 32px; font-size: 12px; color: #888; line-height: 1.6; }
</style>
</head>
<body>
  <h1>賃貸需要ヒートマップ検索</h1>
  <p class="desc">
    住所を入力すると、「見える賃貸経営」(LIFULL HOME'S) の市区町村別ページ（賃貸需要・物件調査・価格動向・街の動向）を開きます。<br>
    ※ toushi.homes.co.jp に事前にログイン済みであることが必要です。
  </p>

  <div class="box">
    <input type="text" id="address" placeholder="例: 埼玉県富士見市関沢3丁目28" autofocus>
    <button id="searchBtn">検索</button>
  </div>

  <div id="result"></div>

  <p class="note">
    ヒートマップの色分けデータは市区町村単位ですが、地図の表示位置は町丁目レベルの座標に自動で合わせます（番地までの厳密なピンは付きません）。<br>
    「賃貸需要」ページのみ自動で新しいタブが開きます。他の3ページはリンクをクリックしてご覧ください。<br>
    表示されない場合は toushi.homes.co.jp に先にログインしてから再度お試しください。
  </p>

<script>
let cityData = null;
const townCache = {};

async function loadData() {
  const res = await fetch("citymap.json");
  cityData = await res.json();
}

async function loadTowns(slug) {
  if (townCache[slug]) return townCache[slug];
  try {
    const res = await fetch(`towns/${slug}.json`);
    const data = await res.json();
    townCache[slug] = data;
    return data;
  } catch (e) {
    return {};
  }
}

async function resolve(address) {
  address = address.replace(/\s+/g, "");
  const { pref_slug, cities } = cityData;

  const prefName = Object.keys(pref_slug).find(p => address.startsWith(p));
  if (!prefName) return null;

  const remainder = address.slice(prefName.length);
  const cityNames = Object.keys(cities[prefName] || {}).sort((a, b) => b.length - a.length);
  const cityName = cityNames.find(c => remainder.startsWith(c));
  if (!cityName) return null;

  const code = cities[prefName][cityName];
  const slug = pref_slug[prefName];
  const cityPath = `/owner/${slug}/city${code}/`;
  const baseUrl = `https://toushi.homes.co.jp${cityPath}`;
  const result = { prefName, cityName, url: baseUrl, cityPath, precise: false };

  const townRemainder = remainder.slice(cityName.length);
  const townsInCity = (await loadTowns(slug))[cityName];
  if (townsInCity) {
    const townPairs = Object.keys(townsInCity)
      .map(t => [t.replace(/^(大字|字)/, ""), t])
      .sort((a, b) => b[0].length - a[0].length);
    const match = townPairs.find(([norm]) => norm && townRemainder.startsWith(norm));
    if (match) {
      const [, townName] = match;
      const [lat, lng] = townsInCity[townName];
      result.url = `${baseUrl}?lat=${lat}&lng=${lng}`;
      result.townName = townName;
      result.precise = true;
    }
  }

  return result;
}

async function onSearch() {
  const address = document.getElementById("address").value.trim();
  const resultEl = document.getElementById("result");

  if (!address) return;
  if (!cityData) await loadData();

  const result = await resolve(address);
  if (!result) {
    resultEl.className = "ng";
    resultEl.innerHTML = `住所から市区町村を特定できませんでした。都道府県名から入力してください（例：埼玉県〜）。`;
    return;
  }

  const label = result.prefName + result.cityName + (result.precise ? result.townName : "");
  const cityBase = `https://toushi.homes.co.jp${result.cityPath}`;
  const pages = [
    ["賃貸需要（空室率・利回り・ヒートマップ）", result.url],
    ["物件調査（掲載物件数・設備条件など）", `${cityBase}bukken/`],
    ["価格動向（地価公示・相場）", `${cityBase}kakaku/`],
    ["街の動向（人口・世帯数など）", `${cityBase}machi/`],
  ];

  resultEl.className = "ok";
  resultEl.innerHTML = `${label} のページを開きます` +
    `<ul class="linklist">` +
    pages.map(([name, url]) => `<li><a href="${url}" target="_blank" rel="noopener">${name}</a></li>`).join("") +
    `</ul>`;
  window.open(result.url, "_blank");
}

document.getElementById("searchBtn").addEventListener("click", onSearch);
document.getElementById("address").addEventListener("keydown", e => {
  if (e.key === "Enter") onSearch();
});

loadData();
</script>
</body>
</html>
